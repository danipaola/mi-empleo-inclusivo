<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#d95fa4">
<title>Mi Empleo Inclusivo</title>
<link rel="manifest" href="./manifest.webmanifest?v=3">
<link rel="stylesheet" href="./styles.css?v=3">
<link rel="icon" href="./icon-192.png">
</head>
<body>
<header class="hero">
  <h1>Mi Empleo Inclusivo</h1>
  <p>Vacantes relacionadas con mi perfil profesional.</p>
  <button id="installBtn" hidden>Instalar app</button>
</header>

<nav class="tabs">
  <button class="tab active" data-tab="vacancies">Vacantes</button>
  <button class="tab" data-tab="linkedin">LinkedIn</button>
  <button class="tab" data-tab="companies">Empresas</button>
</nav>

<main>
  <section id="vacancies" class="panel active">
    <div class="topbar">
      <div><span>Vacantes disponibles</span><strong id="vacancyCount">0</strong></div>
      <button id="refreshBtn">Actualizar</button>
    </div>
    <p id="statusText"></p>
    <div id="vacancyList" class="cards"></div>
    <div id="vacancyEmpty" class="empty">No hay vacantes cargadas.</div>
  </section>

  <section id="linkedin" class="panel">
    <button class="add-btn" id="showLinkedinForm">+ Agregar persona</button>

    <form id="linkedinForm" class="form-card" hidden>
      <label>Nombre completo
        <input id="linkedinName" required placeholder="Ej.: María Pérez">
      </label>
      <label>Link de LinkedIn
        <input id="linkedinUrl" type="url" required placeholder="https://www.linkedin.com/in/...">
      </label>
      <div class="form-actions">
        <button type="submit" class="primary-btn">Guardar</button>
        <button type="button" id="cancelLinkedin" class="outline-btn">Cancelar</button>
      </div>
    </form>

    <div id="linkedinSourceList" class="cards"></div>
    <div id="linkedinEmpty" class="empty">No hay personas cargadas.</div>
  </section>

  <section id="companies" class="panel">
    <input id="companySearch" class="search" type="search" placeholder="Buscar empresa">

    <button class="add-btn" id="showCompanyForm">+ Agregar empresa</button>

    <form id="companyForm" class="form-card" hidden>
      <label>Nombre de la empresa
        <input id="companyName" required placeholder="Ej.: Nueva empresa">
      </label>
      <label>Link del portal
        <input id="companyUrl" type="url" required placeholder="https://...">
      </label>
      <div class="form-actions">
        <button type="submit" class="primary-btn">Guardar</button>
        <button type="button" id="cancelCompany" class="outline-btn">Cancelar</button>
      </div>
    </form>

    <div id="companyList" class="cards"></div>
    <div id="companyEmpty" class="empty">No se encontró esa empresa.</div>
  </section>
</main>

<script src="./app.js?v=3"></script>
</body>
</html>
